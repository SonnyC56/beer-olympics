version: '3'
services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - /app/node_modules
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    ports:
      - '3001:3000'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
